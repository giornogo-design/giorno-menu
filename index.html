<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIORNO 季節メニュー メーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Pinyon+Script&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f2ee; --panel:#ffffff; --line:#e3ded5; --ink:#1a1a1a;
    --muted:#8a8378; --accent:#b89b5e; --accent-d:#9c8146; --danger:#c05a4a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Shippori Mincho",-apple-system,"Hiragino Mincho ProN",serif;
       background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:#fff;
         border-radius:8px;padding:6px 12px;font-size:13px;color:var(--ink);transition:.12s}
  button:hover{border-color:var(--accent);color:var(--accent-d)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{background:var(--accent-d);color:#fff}
  button.mini{padding:2px 7px;font-size:12px;border-radius:6px;line-height:1.4}
  button.danger{color:var(--danger);border-color:#e9cfc9}
  button:disabled{opacity:.4;cursor:default}
  button:disabled:hover{border-color:var(--line);color:var(--ink)}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .collabel{font-size:12px;color:var(--accent-d);letter-spacing:.08em;margin:10px 2px 6px;font-weight:600}
  .rangerow{display:flex;align-items:center;gap:8px;margin:6px 0}
  .rangerow .rv{font-size:11px;color:var(--muted);min-width:38px;text-align:right}
  input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);
         border-radius:7px;padding:6px 8px;background:#fff;color:var(--ink);width:100%}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  textarea{resize:vertical;min-height:38px;line-height:1.5}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);
          border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:20px;letter-spacing:.06em}
  .brand small{font-size:11px;color:var(--muted);letter-spacing:.2em;margin-left:6px;font-family:"Shippori Mincho"}
  .topbar .spacer{flex:1}
  .storebox{display:flex;align-items:center;gap:6px}
  .storebox select{width:auto;min-width:140px;font-size:14px}
  .save-flag{font-size:11px;color:var(--muted)}

  /* ---------- main split ---------- */
  .main{flex:1;display:flex;min-height:0}
  .editor{width:430px;min-width:360px;max-width:46%;overflow-y:auto;padding:16px;
          border-right:1px solid var(--line);background:var(--panel)}
  .preview-wrap{flex:1;overflow:auto;background:#dcd8d0;padding:26px;display:flex;
                flex-direction:column;align-items:center;gap:26px}

  /* editor cards */
  .sec{margin-bottom:18px}
  .sec-h{display:flex;align-items:center;gap:8px;margin:4px 0 10px}
  .sec-h h3{margin:0;font-size:14px;letter-spacing:.04em}
  .sec-h .ln{flex:1;height:1px;background:var(--line)}
  .row{display:flex;gap:8px;margin-bottom:8px}
  .row .f{flex:1}
  .lbl{font-size:11px;color:var(--muted);margin:0 0 3px 2px;display:block}
  .card{border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:11px;background:#fdfcfa}
  .card.cat{background:#faf7f0}
  .card-h{display:flex;align-items:center;gap:6px;margin-bottom:9px}
  .card-h .grip{color:var(--muted);font-size:13px}
  .card-h .ttl{flex:1;font-size:12px;color:var(--muted)}
  .ctrls{display:flex;gap:4px}
  .item{border:1px dashed var(--line);border-radius:8px;padding:8px;margin:7px 0;background:#fff}
  .col-pick{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .col-pick button{border:none;border-radius:0;padding:3px 9px;font-size:12px}
  .col-pick button.on{background:var(--accent);color:#fff}
  .addbtn{width:100%;border-style:dashed;color:var(--muted);margin-top:2px}
  .hint{font-size:11px;color:var(--muted);line-height:1.6;margin:4px 2px}
  .price-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

  /* ---------- PRINT PAGE ---------- */
  .page{width:297mm;height:210mm;background:#fff;color:#111;position:relative;
        box-shadow:0 8px 34px rgba(0,0,0,.18);flex:0 0 auto}
  .page-inner{position:absolute;inset:0;padding:14mm 16mm}

  /* front */
  .m-head{margin-bottom:5mm}
  .m-month{font-family:"Pinyon Script",cursive;font-size:60pt;line-height:.9;color:#111}
  .m-year{font-size:16.2pt;letter-spacing:.15em;color:#333;margin-top:1mm}
  .page-inner.front-inner{display:flex;flex-direction:column}
  .front-cols{display:grid;grid-template-columns:1fr 1fr;gap:10mm;flex:1;min-height:0}
  .fcol{display:flex;flex-direction:column;min-height:0}
  .fcol .cats-mid{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0}
  .cat-block{margin-bottom:7mm;break-inside:avoid}
  .cat-title{display:flex;align-items:baseline;gap:4mm;margin-bottom:2.5mm}
  .cat-title .ja{font-weight:600;font-size:15pt}
  .cat-title .en{font-family:"Cormorant Garamond",serif;font-size:14pt;letter-spacing:.06em;font-weight:500}
  .d-item{display:flex;justify-content:space-between;align-items:baseline;gap:6mm;margin:1.6mm 0}
  .d-item .nm{font-size:9.5pt;font-weight:400}
  .d-item .desc{font-size:7.5pt;color:#555;margin-top:.4mm}
  .d-price{display:flex;gap:6mm;white-space:nowrap;font-size:9pt;font-variant-numeric:tabular-nums}
  .d-price span{min-width:15mm;text-align:right;display:inline-block}
  .d-price .empty{color:transparent}
  .footnote{position:absolute;left:13mm;right:calc(50% + 19mm);bottom:6mm;text-align:center;
            font-size:9pt;color:#2a2a2a;line-height:1.65;white-space:pre-line}
  .fcol-left{transform:translateX(-3mm)}
  .fcol-right{transform:translateX(3mm)}

  /* 二つ折りガイド（画面のみ・印刷されない） */
  .fold-line{position:absolute;top:0;bottom:0;left:50%;border-left:1px dashed #d5cfc3;z-index:5;pointer-events:none}
  .fold-tag{position:absolute;top:2.5mm;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.18em;
            color:#b3ac9e;background:#fff;padding:1px 6px;border-radius:7px;z-index:6}

  /* back（二つ折り外側：左=FOOD/裏表紙、右=ロゴ/表表紙） */
  .back-fold{display:grid;grid-template-columns:1fr 1fr;height:100%}
  .page-inner.fold{padding:14mm 0}
  .panel{position:relative;height:100%}
  .panel-left{padding:0 14mm;display:flex;flex-direction:column;justify-content:center}
  .panel-left .food-title{font-family:"Cormorant Garamond",serif;font-size:30pt;font-weight:500;
            letter-spacing:.05em;text-align:center;margin:1mm 0 5mm}
  .food-list{text-align:center}
  .food-item{margin:3.1mm 0}
  .food-item .nm{font-weight:600;font-size:10.5pt}
  .food-item .desc{font-size:8pt;color:#555;margin-top:.4mm}
  .food-item .pr{font-size:10pt;margin-top:.5mm;font-variant-numeric:tabular-nums}
  .panel-foot{position:absolute;left:14mm;right:14mm;bottom:1mm;text-align:center;
            font-size:9.5pt;color:#222;line-height:1.7;white-space:pre-line}
  .bcover{position:relative;padding:8mm 14mm}
  .cover-center{position:absolute;width:100%;left:50%;top:50%;transform:translate(-50%,-50%);
            display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 14mm}
  .bcover img{max-height:120mm;object-fit:contain}
  .bcover img.clogo{max-width:60%}
  .cover-sub{font-size:11pt;letter-spacing:.45em;color:#1a1a1a;margin-top:1mm}
  .cover-photo{position:absolute;transform:translate(-50%,-50%);max-height:80mm;object-fit:contain;z-index:1}
  .cover-charge{position:absolute;left:14mm;right:14mm;bottom:1mm;text-align:center;
            font-size:9pt;color:#222;line-height:1.6;white-space:normal}
  .bcover .txtlogo{text-align:center}
  .bcover .txtlogo .mn{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:36pt;letter-spacing:.05em}
  .bcover .txtlogo .sb{font-size:10pt;letter-spacing:.55em;color:#333;margin-top:2mm}
  .page-tag{position:absolute;top:-22px;left:0;font-size:11px;color:#5c564c;letter-spacing:.08em}

  /* ---------- モバイルタブ（狭い画面のみ表示） ---------- */
  .mtabs{display:none}

  @media (max-width:820px){
    body{height:100vh}
    .topbar{gap:6px;padding:8px 10px;row-gap:6px}
    .brand{font-size:16px}
    .brand small{display:none}
    .save-flag{display:none}
    .topbar button{padding:6px 9px;font-size:12px}
    .storebox{order:5;width:100%}
    .storebox select{flex:1;min-width:0}
    .topbar .spacer{display:none}

    .mtabs{display:flex;gap:6px;padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--line)}
    .mtabs button{flex:1;padding:10px;font-size:14px;border-radius:9px}
    .mtabs button.on{background:var(--accent);border-color:var(--accent);color:#fff}

    .main{flex-direction:column}
    .editor{width:100%;max-width:100%;min-width:0;border-right:none;flex:1;min-height:0;padding:14px}
    .preview-wrap{width:100%;flex:1;min-height:0;padding:12px}
    .row{flex-direction:column;gap:8px}
    .row .f[style*="max-width"]{max-width:100%!important}

    /* タブで表示を切替 */
    body:not(.mview) .preview-wrap{display:none}
    body.mview .editor{display:none}
    body.mview .preview-wrap{display:flex}
    /* スワイプで縦スクロール＋ピンチ拡大の両方を許可 */
    .preview-wrap{touch-action:pan-y pinch-zoom;-webkit-overflow-scrolling:touch}
  }

  /* ===== 刻（TOKI）テンプレ：A4縦・1枚 ===== */
  .page.portrait{width:210mm;height:297mm}
  .toki-inner{position:absolute;inset:0;padding:26mm 20mm 18mm;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center}
  .toki-logo{margin-top:2mm}
  .toki-logo img{max-width:80%;object-fit:contain}
  .toki-title-main{font-family:"Cormorant Garamond",serif;font-size:19pt;letter-spacing:.24em;margin-top:13mm;font-weight:500}
  .toki-title-sub{font-size:12pt;letter-spacing:.12em;margin-top:3mm}
  .toki-items{width:100%;max-width:160mm;margin:28mm auto 0}
  .toki-item{display:grid;grid-template-columns:32mm 1fr auto;align-items:baseline;gap:5mm;margin:9mm 0}
  .toki-item .tja{font-size:11pt;text-align:left;letter-spacing:.05em}
  .toki-item .ten{font-family:"Cormorant Garamond",serif;font-size:12pt;text-align:center;letter-spacing:.03em}
  .toki-item .tpr{font-size:11pt;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .toki-desc{margin-top:30mm;font-size:9.5pt;line-height:2.05;white-space:pre-line}
  .toki-desc-en{font-family:"Cormorant Garamond",serif;font-size:9.5pt;color:#333;line-height:1.9;margin-top:11mm;white-space:pre-line}
  .toki-foot{position:absolute;left:20mm;right:20mm;bottom:10mm;font-size:8.5pt;color:#222;line-height:1.75;white-space:pre-line}
  .toki-foot .en{font-family:"Cormorant Garamond",serif;color:#444}
  /* 刻：リストページ（P2以降） */
  .toki-list-inner{position:absolute;inset:0;padding:22mm 22mm 22mm;display:flex;flex-direction:column}
  .toki-list-logo{text-align:center;margin-bottom:45mm}
  .toki-list-logo img{object-fit:contain}
  /* P4(茶/おつまみ/スイーツ)は和名列を狭めて英名の幅を確保（長い英名の1行化＆左寄せ） */
  .toki-pg-3 .toki-row{grid-template-columns:42mm 1fr auto}
  .toki-secs{flex:1;min-height:0}
  .toki-sec{margin-bottom:11mm;break-inside:avoid}
  .toki-sec-h{text-align:center;font-size:12pt;letter-spacing:.22em;margin-bottom:9mm}
  .toki-sec-h .en{font-family:"Cormorant Garamond",serif;letter-spacing:.1em;color:#333}
  .toki-row{display:grid;grid-template-columns:64mm 1fr auto;align-items:baseline;gap:4mm;margin:3.2mm 0}
  .toki-row .rja{font-size:10.5pt;letter-spacing:.02em;white-space:nowrap}
  .toki-row .ren{font-family:"Cormorant Garamond",serif;font-size:10pt;letter-spacing:.02em;text-align:center;white-space:nowrap}
  .toki-row .rpr{font-size:10.5pt;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .toki-stack{margin:2.2mm 0}
  .toki-stack .top{display:flex;justify-content:space-between;align-items:baseline;gap:6mm}
  .toki-stack .sja{font-size:10.5pt;letter-spacing:.03em}
  .toki-stack .spr{font-size:10.5pt;font-variant-numeric:tabular-nums;white-space:nowrap}
  .toki-stack .sen{font-family:"Cormorant Garamond",serif;font-size:10pt;color:#333;margin-top:.4mm}

  /* ===== 駅前店（EKIMAE / GIORNO Fukui）：A5中綴じ8ページ ===== */
  .ek-hide{display:none}
  .ek-spread{width:297mm;height:210mm;background:#fff;color:#111;position:relative;
        box-shadow:0 8px 34px rgba(0,0,0,.18);flex:0 0 auto;display:flex}
  .ek-half{width:148.5mm;height:210mm;position:relative;overflow:hidden}
  .page.a5{width:148.5mm;height:210mm}
  .ek-fold{position:absolute;top:0;bottom:0;left:50%;border-left:1px dashed #d5cfc3;z-index:5;pointer-events:none}
  .ek-tag{position:absolute;top:2mm;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.15em;
        color:#b3ac9e;background:#fff;padding:1px 7px;border-radius:7px;z-index:6}
  .ek-inner{position:absolute;inset:0;padding:14mm 13mm;display:flex;flex-direction:column}
  /* 表紙 */
  .ek-cover{align-items:center;justify-content:center;text-align:center}
  .ek-cover img{max-width:66%;object-fit:contain;margin-bottom:5mm}
  .ek-cover .tmain{font-family:"Cormorant Garamond",serif;font-size:24pt;letter-spacing:.06em;font-weight:600}
  .ek-cover .tsub{font-size:16.5pt;letter-spacing:.4em;color:#333;margin-top:-4mm}
  /* 本文ページ（セクション）。全ページ本文の開始位置を統一（padding-top＋先頭見出しの上マージン0） */
  .ek-page{padding:13mm 12mm 14mm}
  .ek-sec{margin-bottom:3mm;break-inside:avoid}
  .ek-page>.ek-sec:first-child .ek-h-main,.ek-page>.ek-sec:first-child .ek-h-sub{margin-top:0}
  /* 先頭見出しに固定高さ→サブタイトル有無に関わらず本文(品目)の開始位置を統一 */
  .ek-page>.ek-sec:first-child .ek-h-main{min-height:13mm}
  /* P5ワインは「Wine」表題＋小見出しの二段構成なので固定高さを外して上に寄せる */
  .ek-pg-4>.ek-sec:first-child .ek-h-main{min-height:0}
  .ek-h-main{text-align:center;font-family:"Cormorant Garamond",serif;font-size:14pt;letter-spacing:.1em;margin:1mm 0 3.5mm}
  .ek-h-main .en{display:block;font-family:"Shippori Mincho",serif;font-size:10.5pt;letter-spacing:.05em;color:#333;margin-top:1.5mm}
  .ek-h-sub{font-size:11pt;letter-spacing:.05em;font-weight:600;margin:3.5mm 0 1.5mm}
  .ek-h-sub .en{font-family:"Cormorant Garamond",serif;font-size:9pt;color:#666;font-weight:400}
  .ek-secnote{font-size:8pt;color:#555;line-height:1.55;text-align:center;margin:2.5mm 0;white-space:pre-line}
  .ek-srow{display:flex;justify-content:space-between;align-items:baseline;gap:4mm;margin:1.7mm 0}
  .ek-srow .sn{font-size:9.5pt}
  .ek-srow .sp{font-size:9.5pt;font-variant-numeric:tabular-nums;white-space:nowrap}
  .ek-dual{margin:1mm 0}
  .ek-drow{display:grid;grid-template-columns:1fr 21mm 21mm;align-items:baseline;gap:2mm;margin:1.7mm 0}
  .ek-drow .dn{font-size:9.5pt}
  .ek-drow .dp{font-size:9.5pt;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .ek-dhead{margin-bottom:1mm}
  .ek-dhead .dp{font-size:8.5pt;color:#666}
  /* 各面下部の注記・チャージ */
  .ek-foot{position:absolute;left:12mm;right:12mm;bottom:6mm;text-align:center;font-size:8pt;color:#333;line-height:1.6;white-space:pre-line}
  /* 価格モード: tilde=「0」で桁揃え（〜は右のスロットに逃がす） */
  .ek-pm-tilde .ek-srow .sp{display:inline-flex;justify-content:flex-end;align-items:baseline}
  .ek-pm-tilde .ek-drow .dp{display:flex;justify-content:flex-end;align-items:baseline;text-align:right}
  .ek-pm-tilde .pnum{text-align:right}
  .ek-pm-tilde .ptil{display:inline-block;width:3mm;text-align:left}
  .ek-pm-tilde .ek-drow .dp .pask{flex:1;text-align:center}
  /* 価格モード: center=テキストと価格を中央 */
  .ek-pm-center .ek-drow .dp,.ek-pm-center .ek-dhead .dp{text-align:center}
  /* 行間2倍: 摘む(P2)/ウイスキー(P6)/フード(P7) */
  .ek-pg-1 .ek-drow{margin-top:3.4mm;margin-bottom:3.4mm}
  .ek-pg-5 .ek-srow,.ek-pg-6 .ek-srow{margin-top:3.4mm;margin-bottom:3.4mm}
  /* P4: Soft drink(2番目のセクション)を下げてAlcoholicとの間を空ける */
  .ek-pg-3>.ek-sec:nth-child(2){margin-top:32mm}
  /* P4は品目18＋間隔で最密なので行間を少し詰める */
  .ek-pg-3 .ek-srow{margin-top:1.4mm;margin-bottom:1.4mm}

  /* ===== 駅前店（昼 / HIRU）：A4縦・ek系セクション流用 ===== */
  .hiru-inner{position:absolute;inset:0;padding:15mm 24mm 15mm;display:flex;flex-direction:column}
  .hiru-logo{text-align:center;margin-bottom:6mm}
  .hiru-logo img{max-width:48%;object-fit:contain}
  .hiru-sub{text-align:center;font-size:11pt;letter-spacing:.3em;color:#555;margin:-4mm 0 7mm}
  .hiru-lead{text-align:center;font-size:11pt;letter-spacing:.06em;color:var(--accent-d);
        border-top:1px solid var(--accent);border-bottom:1px solid var(--accent);padding:3mm 0;margin:0 0 8mm}
  .hiru-secs{flex:1;min-height:0}
  /* A4はA5より広いので本文を少し大きく */
  .hiru-secs .ek-h-main{font-size:15pt;margin:1mm 0 4mm}
  .hiru-secs .ek-h-main .en{font-size:11pt}
  .hiru-secs .ek-sec{margin-bottom:5mm}
  .hiru-secs .ek-srow{margin:2mm 0}
  .hiru-secs .ek-srow .sn,.hiru-secs .ek-srow .sp{font-size:10.5pt}
  .hiru-secs .ek-drow{grid-template-columns:1fr 24mm 24mm;margin:2mm 0}
  .hiru-secs .ek-drow .dn,.hiru-secs .ek-drow .dp{font-size:10.5pt}
  .hiru-secs .ek-dhead .dp{font-size:9pt}
  .hiru-secs .ek-secnote{font-size:8.5pt}
  .hiru-foot{position:absolute;left:24mm;right:24mm;bottom:12mm;text-align:center;font-size:9pt;color:#333;line-height:1.7;white-space:pre-line}

  @media print{
    html,body{height:auto;overflow:visible;background:#fff}
    .topbar,.mtabs,.editor,.no-print{display:none!important}
    .main,.preview-wrap{display:block;padding:0;overflow:visible;background:#fff;height:auto}
    .page{box-shadow:none;margin:0!important;transform:none!important;page-break-after:always;break-after:page}
    .page:last-child{page-break-after:auto}
    .page-tag{display:none}
    /* 駅前店：校正表示中でも印刷は必ず面付けスプレッドを出す */
    .ek-spreads{display:block!important}
    .ek-reads{display:none!important}
  }
</style>
<style id="pageSizeStyle">@page{size:A4 landscape;margin:0}</style>
</head>
<body>

<div class="topbar no-print">
  <div class="brand">GIORNO<small>季節メニュー メーカー</small></div>
  <div class="storebox">
    <span class="lbl" style="margin:0">店舗</span>
    <select id="storeSel"></select>
    <button class="mini" id="addStore">＋店舗</button>
    <button class="mini" id="renStore">名称変更</button>
    <button class="mini danger" id="delStore">削除</button>
  </div>

let state = load() || { current:"片町店", stores:{ "片町店": katamachiSeed() } };

function load(){ try{return JSON.parse(localStorage.getItem(LS_KEY))}catch(e){return null} }
function persist(){
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  const f=document.getElementById("saveFlag"); f.textContent="自動保存 済 ✓";
  clearTimeout(persist._t); persist._t=setTimeout(()=>f.textContent="自動保存 済",1200);
}
const cur = () => state.stores[state.current];

    fv.querySelector('[data-df]').onclick=()=>{pushUndo();s.back.items.splice(fi,1);renderEditor();renderPreview();persist();};
    fv.querySelector('.fn').oninput=e=>{f.name=e.target.value;renderPreview();persist();};
    fv.querySelector('.fp').oninput=e=>{f.price=e.target.value;renderPreview();persist();};
    fv.querySelector('.fd').oninput=e=>{f.desc=e.target.value;renderPreview();persist();};
    foods.appendChild(fv);
  });

  // top-level fields
  bind("#mMonth","meta.month"); bind("#mYear","meta.year");
  bind("#cLabel","meta.cLabel",true); bind("#mLabel","meta.mLabel",true);
  bind("#footnote","front.footnote");
  bind("#bHeading","back.heading"); bind("#bLogoMain","back.logoMain"); bind("#bLogoSub","back.logoSub");
  bind("#bNote","back.note"); bind("#bCharge","back.charge");
  const addCatTo=(col)=>{pushUndo();s.front.categories.push({id:uid(),fruitJa:"",fruitEn:"",col,items:[{id:uid(),name:"",desc:"",c:"",m:""}]});renderEditor();renderPreview();persist();};
  el.querySelector("#addCatL").onclick=()=>addCatTo(1);
  el.querySelector("#addCatR").onclick=()=>addCatTo(2);
  el.querySelector("#addFood").onclick=()=>{pushUndo();s.back.items.push({id:uid(),name:"",desc:"",price:""});renderEditor();renderPreview();persist();};
  el.querySelector("#illusFile").onchange=onIllus;
  const ic=el.querySelector("#illusClear"); if(ic) ic.onclick=()=>{pushUndo();s.back.illus="";renderEditor();renderPreview();persist();};
  el.querySelector("#photoFile").onchange=onPhoto;
  const pc=el.querySelector("#photoClear"); if(pc) pc.onclick=()=>{pushUndo();s.back.photo="";renderEditor();renderPreview();persist();};
  const lsz=el.querySelector("#logoScale");
  if(lsz) lsz.oninput=e=>{s.back.logoScale=+e.target.value;el.querySelector("#logoScaleV").textContent=e.target.value+"%";renderPreview();persist();};
  const lyz=el.querySelector("#logoY");
  if(lyz) lyz.oninput=e=>{s.back.logoY=+e.target.value;el.querySelector("#logoYV").textContent=e.target.value+"%";renderPreview();persist();};
  const lxz=el.querySelector("#logoX");
  if(lxz) lxz.oninput=e=>{s.back.logoX=+e.target.value;el.querySelector("#logoXV").textContent=e.target.value+"%";renderPreview();persist();};
  const psz=el.querySelector("#photoScale");
  if(psz) psz.oninput=e=>{s.back.photoScale=+e.target.value;el.querySelector("#photoScaleV").textContent=e.target.value+"%";renderPreview();persist();};
  const pyz=el.querySelector("#photoY");
  if(pyz) pyz.oninput=e=>{s.back.photoY=+e.target.value;el.querySelector("#photoYV").textContent=e.target.value+"%";renderPreview();persist();};
  const pxz=el.querySelector("#photoX");
  if(pxz) pxz.oninput=e=>{s.back.photoX=+e.target.value;el.querySelector("#photoXV").textContent=e.target.value+"%";renderPreview();persist();};
  // 月：リスト選択 → 自由入力欄へ反映
  const msel=el.querySelector("#mMonthSel");
  if(msel) msel.onchange=e=>{
    const v=e.target.value;
    if(v==='__custom'){ el.querySelector('#mMonth').focus(); return; }
    if(v){ pushUndo(); s.meta.month=v; el.querySelector('#mMonth').value=v; renderPreview(); persist(); }
  };
}

function bind(sel,path,relabel){
  const node=document.querySelector(sel); if(!node)return;
  node.oninput=e=>{ setPath(cur(),path,e.target.value); renderPreview(); persist();
    if(relabel){ /* labels shown in placeholders update on next structural render */ } };
}
function setPath(o,path,v){const p=path.split('.');let t=o;for(let i=0;i<p.length-1;i++)t=t[p[i]];t[p[p.length-1]]=v;}

function moveCat(i,dir){ // 同じ列の中で並び替え
  const a=cur().front.categories; const col=a[i].col===2?2:1;
  let j=i+dir; while(j>=0&&j<a.length){ if((a[j].col===2?2:1)===col) break; j+=dir; }
  if(j<0||j>=a.length)return;
  pushUndo();[a[i],a[j]]=[a[j],a[i]];renderEditor();renderPreview();persist();}
function moveItem(c,i,dir){const j=i+dir;if(j<0||j>=c.items.length)return;pushUndo();[c.items[i],c.items[j]]=[c.items[j],c.items[i]];renderEditor();renderPreview();persist();}
function moveFood(i,dir){const a=cur().back.items;const j=i+dir;if(j<0||j>=a.length)return;pushUndo();[a[i],a[j]]=[a[j],a[i]];renderEditor();renderPreview();persist();}

function onIllus(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{pushUndo();cur().back.illus=r.result;renderEditor();renderPreview();persist();};
  r.readAsDataURL(file);
}
function onPhoto(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{pushUndo();const b=cur().back;b.photo=r.result;
    if(b.photoX==null)b.photoX=50; if(b.photoY==null)b.photoY=60; /* 空きスペース中央に初期配置 */
    if(b.logoY==null||b.logoY===50)b.logoY=20; /* ロゴは自動で上へ */
    renderEditor();renderPreview();persist();};
  r.readAsDataURL(file);
}

/* =========================================================
   描画：プレビュー（A4横 表裏）
========================================================= */
function renderPreview(){
  const s=cur();
  if(s.template==="ekimae"){ renderPreviewEkimae(s); return; }
  if(s.template==="hiru"){ renderPreviewHiru(s); return; }
  const isToki=(s.template||"katamachi")==="toki";
  document.getElementById('pageSizeStyle').textContent='@page{size:A4 '+(isToki?'portrait':'landscape')+';margin:0}';
  if(isToki){ renderPreviewToki(s); return; }
  const col=(n)=> s.front.categories.filter(c=>c.col===n).map(catHTML).join("");
  const priceCell=(v)=> v? `<span>${esc(v)}</span>` : `<span class="empty">-</span>`;
  function catHTML(c){
    const items=c.items.map(it=>`
      <div class="d-item">
        <div><div class="nm">${esc(it.name)}</div>${it.desc?`<div class="desc">${esc(it.desc)}</div>`:''}</div>
        <div class="d-price">${it.c?`<span>${esc(s.meta.cLabel)} ${esc(it.c)}</span>`:priceCell('')}${it.m?`<span>${esc(s.meta.mLabel)} ${esc(it.m)}</span>`:priceCell('')}</div>
      </div>`).join("");
    return `<div class="cat-block"><div class="cat-title"><span class="ja">${esc(c.fruitJa)}</span><span class="en">${esc(c.fruitEn)}</span></div>${items}</div>`;
  }
  const foods=s.back.items.map(f=>`
    <div class="food-item"><div class="nm">${esc(f.name)}</div>${f.desc?`<div class="desc">${esc(f.desc)}</div>`:''}<div class="pr">${esc(f.price)}</div></div>`).join("");

  const front=`
   <div class="page"><span class="page-tag no-print">表面（内側・二つ折り）</span>
     <div class="fold-line no-print"></div><div class="fold-tag no-print">折り線</div>
     <div class="page-inner front-inner">
       <div class="front-cols">
         <div class="fcol fcol-left">
           <div class="m-head"><div class="m-month">${esc(s.meta.month)}</div><div class="m-year">${esc(s.meta.year)}</div></div>
           <div class="cats-mid">${col(1)}</div>
         </div>
         <div class="fcol fcol-right">
           <div class="cats-mid">${col(2)}</div>
         </div>
       </div>
       <div class="footnote">${esc(s.front.footnote)}</div>
     </div>
   </div>`;

  const ls=s.back.logoScale||60, ps=s.back.photoScale||55;
  const px=(s.back.photoX==null?50:s.back.photoX), py=(s.back.photoY==null?60:s.back.photoY);
  const lx=(s.back.logoX==null?50:s.back.logoX);
  const ly=(s.back.logoY==null?(s.back.coverPos==='top'?20:50):s.back.logoY);
  const photoTag = s.back.photo ? `<img class="cover-photo" src="${s.back.photo}" style="left:${px}%;top:${py}%;max-width:${ps}%">` : '';
  const coverInner = s.back.illus
     ? `<img class="clogo" src="${s.back.illus}" style="max-width:${ls}%"><div class="cover-sub">${esc(s.back.logoSub)}</div>`
     : `<div class="txtlogo"><div class="mn">${esc(s.back.logoMain)}</div><div class="sb">${esc(s.back.logoSub)}</div></div>`;
  const back=`
   <div class="page"><span class="page-tag no-print">裏面（外側・二つ折り）　左＝FOOD／右＝表紙</span>
     <div class="fold-line no-print"></div><div class="fold-tag no-print">折り線</div>
     <div class="page-inner fold">
       <div class="back-fold">
         <div class="panel panel-left">
           <div class="food-title">${esc(s.back.heading)}</div>
           <div class="food-list">${foods}</div>
           <div class="panel-foot">${esc(s.back.note)}</div>
         </div>
         <div class="panel bcover">
           <div class="cover-center" style="left:${lx}%;top:${ly}%">${coverInner}</div>
           ${photoTag}
           <div class="cover-charge">${esc(s.back.charge)}</div>
         </div>
       </div>
     </div>
   </div>`;

  const wrap=document.getElementById("preview");
  wrap.innerHTML=front+back;
  fitScale();
}

/* ===== 刻（TOKI）テンプレ：複数ページ ===== */
function renderPreviewToki(s){
  const t=s.toki;
  if(!t.pages){ s.toki=migrateToki(t); return renderPreviewToki(s); }
  const foot=`<div class="toki-foot">${esc(t.footJa)}<br><span class="en">${esc(t.footEn)}</span></div>`;
  const rowItem=(it)=>`<div class="toki-row"><div class="rja">${esc(it.ja)}</div><div class="ren">${esc(it.en)}</div><div class="rpr">${esc(it.price)}</div></div>`;
  const stackItem=(it)=>`<div class="toki-stack"><div class="top"><span class="sja">${esc(it.ja)}</span><span class="spr">${esc(it.price)}</span></div><div class="sen">${esc(it.en)}</div></div>`;
  const sectionHTML=(sc)=>{
    const items=(sc.items||[]).map(sc.layout==="stack"?stackItem:rowItem).join("");
    const en=sc.headingEn?`<span class="en">${esc(sc.headingEn)}</span>`:"";
    return `<div class="toki-sec"><div class="toki-sec-h">${esc(sc.heading)}　${en}</div>${items}</div>`;
  };
  const pages=t.pages.map((p,pi)=>{
    if(p.kind==="hero"){
      const its=(p.items||[]).map(it=>`<div class="toki-item"><div class="tja">${esc(it.ja)}</div><div class="ten">${esc(it.en)}</div><div class="tpr">${esc(it.price)}</div></div>`).join("");
      const logo = t.logo ? `<div class="toki-logo"><img src="${t.logo}" style="max-height:${t.logoScale||40}mm"></div>` : "";
      return `<div class="page portrait"><span class="page-tag no-print">刻メニュー P${pi+1}（表紙）</span>
        <div class="toki-inner">
          ${logo}
          <div class="toki-title-main">${esc(p.titleMain)}</div>
          <div class="toki-title-sub">${esc(p.titleSub)}</div>
          <div class="toki-items">${its}</div>
          <div class="toki-desc">${esc(p.descJa)}</div>
          <div class="toki-desc-en">${esc(p.descEn)}</div>
          ${foot}
        </div></div>`;
    }
    const secs=(p.sections||[]).map(sectionHTML).join("");
    const logoTop = t.logo ? `<div class="toki-list-logo"><img src="${t.logo}" style="max-height:24mm"></div>` : "";
    return `<div class="page portrait toki-pg-${pi}"><span class="page-tag no-print">刻メニュー P${pi+1}</span>
      <div class="toki-list-inner">
        ${logoTop}
        <div class="toki-secs">${secs}</div>
        ${foot}
      </div></div>`;
  }).join("");
  const wrap=document.getElementById("preview");
  wrap.innerHTML=pages;
  fitScale();
}

  function wireItems(container, arr){

        <div class="card-h"><span class="ttl">${ii+1}</span><div class="ctrls">
          <button class="mini" data-u ${ii===0?'disabled':''}>▲</button>

     <div class="row"><div class="f"><span class="lbl">脚注（英語・全ページ共通）</span><input id="tFootEn" value="${esc(t.footEn)}"></div></div>

  const box=el.querySelector("#tPages");

        secBox.appendChild(box2);
        box2.querySelectorAll('[data-sh]').forEach(inp=>inp.addEventListener('input',ev=>{sc[inp.dataset.sh]=ev.target.value;renderPreview();persist();}));

        box2.querySelector('[data-su]').onclick=()=>{if(si>0){pushUndo();[p.sections[si-1],p.sections[si]]=[p.sections[si],p.sections[si-1]];renderEditor();renderPreview();persist();}};
        box2.querySelector('[data-sd]').onclick=()=>{if(si<p.sections.length-1){pushUndo();[p.sections[si+1],p.sections[si]]=[p.sections[si],p.sections[si+1]];renderEditor();renderPreview();persist();}};

  el.querySelector("#tFootJa").addEventListener('input',e=>{t.footJa=e.target.value;renderPreview();persist();});
  el.querySelector("#tFootEn").addEventListener('input',e=>{t.footEn=e.target.value;renderPreview();persist();});
  el.querySelector("#tAddPage").onclick=()=>{pushUndo();t.pages.push({id:uid(),kind:"list",sections:[{id:uid(),heading:"",headingEn:"",layout:"row",items:[{id:uid(),ja:"",en:"",price:""}]}]});renderEditor();renderPreview();persist();};

/* ===== 駅前店（EKIMAE）テンプレ ===== */
function ekFootHTML(p, day, charge){
  const parts=[];
  if(p.foot) parts.push(esc(p.foot));
  if(!day && charge) parts.push(esc(charge));
  return parts.length?`<div class="ek-foot">${parts.join("<br>")}</div>`:"";
}
/* 価格の書式。tilde=末尾の〜/～/~を数字と分けて「0」で桁揃え、center=中央、既定=そのまま右 */
function ekPrice(v, mode){
  v = v==null?"":String(v);
  if(mode==='tilde'){
    if(/[～〜~].+/.test(v)) return `<span class="pask">${esc(v)}</span>`; // 〜の後に文字（例:1,700〜ASK）は中央寄せ
    const m=v.match(/^(.*?)([～〜~])$/);
    if(m) return `<span class="pnum">${esc(m[1])}</span><span class="ptil">${esc(m[2])}</span>`;
    return `<span class="pnum">${esc(v)}</span><span class="ptil"></span>`;
  }
  return esc(v);
}
function ekSectionHTML(sc){
  const mode=sc.priceMode||"";
  const headCls = sc.sub ? "ek-h-sub" : "ek-h-main";
  const en = sc.headingEn?`<span class="en">${esc(sc.headingEn)}</span>`:"";
  const sp = (sc.heading && sc.headingEn)?(sc.sub?" ":"　"):"";
  const head = (sc.heading||sc.headingEn)?`<div class="${headCls}">${esc(sc.heading)}${sp}${en}</div>`:"";
  const note = sc.note?`<div class="ek-secnote">${esc(sc.note)}</div>`:"";
  let body="";
  if(sc.layout==="dual"){
    const ph=sc.priceHeads||[];
    const heads=(ph[0]||ph[1])?`<div class="ek-drow ek-dhead"><span class="dn"></span><span class="dp">${esc(ph[0]||"")}</span><span class="dp">${esc(ph[1]||"")}</span></div>`:"";
    const rows=(sc.items||[]).map(it=>`<div class="ek-drow"><span class="dn">${esc(it.name)}</span><span class="dp">${ekPrice(it.p1,mode)}</span><span class="dp">${ekPrice(it.p2,mode)}</span></div>`).join("");
    body=`<div class="ek-dual">${heads}${rows}</div>`;
  } else {
    body=(sc.items||[]).map(it=>`<div class="ek-srow"><span class="sn">${esc(it.name)}</span><span class="sp">${ekPrice(it.p1,mode)}</span></div>`).join("");
  }
  const pmCls = mode?(" ek-pm-"+mode):"";
  return `<div class="ek-sec${pmCls}">${head}${body}${note}</div>`;
}
function ekInnerHTML(p, day, charge, idx){
  const pg = (idx==null?"":" ek-pg-"+idx);
  if(p.kind==="blank"){ return `<div class="ek-inner ek-blank${pg}"></div>`; }
  if(p.kind==="cover"){
    const logo=p.logo?`<img src="${p.logo}" style="max-width:${p.logoScale||60}%">`:'';
    const tmain=p.titleMain?`<div class="tmain">${esc(p.titleMain)}</div>`:'';
    const tsub=p.titleSub?`<div class="tsub">${esc(p.titleSub)}</div>`:'';
    return `<div class="ek-inner ek-cover${pg}">${logo}${tmain}${tsub}${ekFootHTML(p,day,charge)}</div>`;
  }
  const secs=(p.sections||[]).map(ekSectionHTML).join("");
  return `<div class="ek-inner ek-page${pg}">${secs}${ekFootHTML(p,day,charge)}</div>`;
}
function renderPreviewEkimae(s){

  const spreads=sheets.map(([l,r,tag])=>`

        <div class="row"><div class="f"><span class="lbl">価格列</span><div class="col-pick"><button data-lay="single" class="${!dual?'on':''}">1価格</button><button data-lay="dual" class="${dual?'on':''}">2価格</button></div></div></div>
        ${dual?`<div class="row"><div class="f"><span class="lbl">価格列1の名前</span><input data-ph="0" value="${esc((sc.priceHeads||[])[0]||'')}"></div><div class="f"><span class="lbl">価格列2の名前</span><input data-ph="1" value="${esc((sc.priceHeads||[])[1]||'')}"></div></div>`:''}
        <div class="row"><div class="f"><span class="lbl">説明（任意）</span><textarea data-sn>${esc(sc.note||'')}</textarea></div></div>
        <div data-items></div>
        <button class="addbtn" data-additem>＋ 品目を追加</button>`;
      secBox.appendChild(box2);
      box2.querySelectorAll('[data-sh]').forEach(inp=>inp.addEventListener('input',ev=>{sc[inp.dataset.sh]=ev.target.value;renderPreview();persist();}));
      box2.querySelector('[data-sn]').addEventListener('input',ev=>{sc.note=ev.target.value;renderPreview();persist();});
      box2.querySelectorAll('[data-ph]').forEach(inp=>inp.addEventListener('input',ev=>{sc.priceHeads=sc.priceHeads||[];sc.priceHeads[+inp.dataset.ph]=ev.target.value;renderPreview();persist();}));
      box2.querySelector('[data-lay="single"]').onclick=()=>{pushUndo();sc.layout="single";renderEditor();renderPreview();persist();};
      box2.querySelector('[data-lay="dual"]').onclick=()=>{pushUndo();sc.layout="dual";if(!sc.priceHeads||!sc.priceHeads.length)sc.priceHeads=["",""];renderEditor();renderPreview();persist();};
      box2.querySelector('[data-su]').onclick=()=>{if(si>0){pushUndo();[p.sections[si-1],p.sections[si]]=[p.sections[si],p.sections[si-1]];renderEditor();renderPreview();persist();}};
      box2.querySelector('[data-sd]').onclick=()=>{if(si<p.sections.length-1){pushUndo();[p.sections[si+1],p.sections[si]]=[p.sections[si],p.sections[si+1]];renderEditor();renderPreview();persist();}};
      box2.querySelector('[data-sx]').onclick=()=>{pushUndo();p.sections.splice(si,1);renderEditor();renderPreview();persist();};
      wireItems(box2.querySelector('[data-items]'), sc.items, dual);
      box2.querySelector('[data-additem]').onclick=()=>{pushUndo();sc.items.push({id:uid(),name:"",p1:"",p2:""});renderEditor();renderPreview();persist();};
    });
  });

  el.querySelector("#hLogoFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{pushUndo();h.logo=r.result;renderEditor();renderPreview();persist();};r.readAsDataURL(f);};
  const lsz=el.querySelector("#hLogoScale"); if(lsz) lsz.oninput=e=>{h.logoScale=+e.target.value;el.querySelector("#hLogoScaleV").textContent=e.target.value+"%";renderPreview();persist();};
  el.querySelector("#hSub").addEventListener('input',e=>{h.sub=e.target.value;renderPreview();persist();});
  el.querySelector("#hFoot").addEventListener('input',e=>{h.foot=e.target.value;renderPreview();persist();});
  el.querySelector("#hAddPage").onclick=()=>{pushUndo();h.pages.push({id:uid(),sections:[{id:uid(),heading:"",headingEn:"",sub:false,layout:"single",priceHeads:[],note:"",items:[{id:uid(),name:"",p1:"",p2:""}]}]});renderEditor();renderPreview();persist();};
}

/* プレビューを枠に合わせて縮小 */
function fitScale(){
  const wrap=document.getElementById("preview");
  if(!wrap.clientWidth) return; // 非表示中はスキップ
  const pages=wrap.querySelectorAll(".page");
  const cs=getComputedStyle(wrap);
  const pad=parseFloat(cs.paddingLeft)+parseFloat(cs.paddingRight);
  const avail=wrap.clientWidth-pad-4;
  pages.forEach(p=>{ // 用紙サイズ（縦/横）ごとに自動で縮尺
    p.style.transform="none";
    const w=p.offsetWidth, h=p.offsetHeight;
    const scale=Math.min(1, avail/w);
    p.style.transform=`scale(${scale})`; p.style.transformOrigin="top center";
    p.style.marginBottom=(h*scale - h + 26)+"px"; });
}
window.addEventListener("resize",fitScale);

/* =========================================================
   店舗・入出力
========================================================= */
function renderStores(){
  const sel=document.getElementById("storeSel");
  sel.innerHTML=Object.keys(state.stores).map(n=>`<option ${n===state.current?'selected':''}>${esc(n)}</option>`).join("");
}
document.getElementById("storeSel").onchange=e=>{state.current=e.target.value;renderEditor();renderPreview();persist();};
document.getElementById("addStore").onclick=()=>{
  const n=prompt("新しい店舗名を入力","");if(!n)return;
  if(state.stores[n]){alert("同名の店舗があります");return;}
  const t=prompt("デザインを選んでください：\n1 = 片町型（A4横・果物カクテル）\n2 = 刻型（A4縦・樽熟酒）\n3 = 駅前型（A5中綴じ8ページ冊子）\n4 = 駅前昼型（A4縦・パフェ&カフェ）\n\n番号を入力","1");
  if(t===null)return;
  pushUndo();
  if(t.trim()==="2"){ state.stores[n]=tokiSeed(); }
  else if(t.trim()==="3"){ state.stores[n]=ekimaeSeed(); }
  else if(t.trim()==="4"){ state.stores[n]=hiruSeed(); }
  else if(confirm("片町店の内容をコピーして作成しますか？（キャンセルで空から作成）"))
     state.stores[n]=JSON.parse(JSON.stringify(state.stores["片町店"]||katamachiSeed()));
  else state.stores[n]=emptyStore();
  state.current=n;renderStores();renderEditor();renderPreview();persist();
};
document.getElementById("renStore").onclick=()=>{
  const n=prompt("店舗名を変更",state.current);if(!n||n===state.current)return;
  if(state.stores[n]){alert("同名の店舗があります");return;}
  pushUndo();
  state.stores[n]=state.stores[state.current];delete state.stores[state.current];
  state.current=n;renderStores();persist();
};
document.getElementById("delStore").onclick=()=>{
  if(Object.keys(state.stores).length<=1){alert("最後の1店舗は削除できません");return;}
  if(!confirm(`店舗「${state.current}」を削除しますか？`))return;
  pushUndo();
  delete state.stores[state.current];state.current=Object.keys(state.stores)[0];
  renderStores();renderEditor();renderPreview();persist();
};
function emptyStore(){return{meta:{month:"",year:"2026",cLabel:"C",mLabel:"M"},
  front:{categories:[{id:uid(),fruitJa:"",fruitEn:"",col:1,items:[{id:uid(),name:"",desc:"",c:"",m:""}]}],footnote:""},
  back:{heading:"FOOD",logoMain:"GIORNO",logoSub:"ジョルノ",photo:"",logoScale:60,photoScale:55,photoX:50,photoY:60,logoX:50,logoY:50,items:[{id:uid(),name:"",desc:"",price:""}],illus:DEFAULT_LOGO,logoSeeded:true,note:"",charge:""}};}

document.getElementById("saveBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`GIORNO_メニュー_${new Date().toISOString().slice(0,10)}.json`;a.click();
};
document.getElementById("loadBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(!d.stores||!d.current)throw 0;
    state=d;renderStores();renderEditor();renderPreview();persist();
    alert("読み込みました");}catch(x){alert("読み込めませんでした（ファイル形式が違います）");}};
  r.readAsText(f);e.target.value="";
};
document.getElementById("printBtn").onclick=()=>window.print();

/* モバイル：編集 / プレビュー タブ切替 */
(function(){
  const mE=document.getElementById('mtabEdit'), mV=document.getElementById('mtabView');
  if(!mE||!mV)return;
  mE.onclick=()=>{document.body.classList.remove('mview');mE.classList.add('on');mV.classList.remove('on');};
  mV.onclick=()=>{document.body.classList.add('mview');mV.classList.add('on');mE.classList.remove('on');requestAnimationFrame(fitScale);};
})();

/* util */
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* =========================================================
   元に戻す（undo）
========================================================= */
let undoStack=[];
function snapshot(){return JSON.stringify({current:state.current,stores:state.stores});}
function pushUndo(){
  const snap=snapshot();
  if(undoStack.length && undoStack[undoStack.length-1]===snap) return; // 変化なしはスキップ
  undoStack.push(snap);
  if(undoStack.length>100) undoStack.shift();
  updateUndoBtn();
}
function updateUndoBtn(){ const b=document.getElementById('undoBtn'); if(b) b.disabled=undoStack.length===0; }
function doUndo(){
  if(!undoStack.length) return;
  const prev=JSON.parse(undoStack.pop());
  state.current=prev.current; state.stores=prev.stores;
  renderStores(); renderEditor(); renderPreview();
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  updateUndoBtn();
}
document.getElementById('undoBtn').onclick=doUndo;
// テキスト入力は、フィールドにフォーカスした時点を1手として記録
document.getElementById('editor').addEventListener('focusin', e=>{
  if(e.target.matches('input, textarea, select')) pushUndo();
});

/* init */
/* 既定ロゴを全端末に適用（空のstoreにDEFAULT_LOGOを1度だけ） */
Object.values(state.stores).forEach(st=>{ if(!st.template) st.template='katamachi'; if(st.back){ if(!st.back.logoSeeded && !st.back.illus){ st.back.illus=DEFAULT_LOGO; } st.back.logoSeeded=true; } });
/* 刻メニューを全端末に1度だけ追加（削除後は復活しない） */
if(!state.tokiSeeded && !state.stores['刻']){ state.stores['刻']=tokiSeed(); }
state.tokiSeeded=true;
/* 刻を新構造（複数ページ）へ移行 */
Object.values(state.stores).forEach(st=>{ if(st.template==='toki' && st.toki && !st.toki.pages){ st.toki=migrateToki(st.toki); } });
/* 刻を正式な4ページ版へ全端末で1度だけ更新 */
if(!state.tokiV3Seeded){ if(state.stores['刻'] && state.stores['刻'].template==='toki'){ state.stores['刻']=tokiSeed(); } state.tokiV3Seeded=true; }
/* 駅前店メニューを全端末に1度だけ追加（削除後は復活しない） */
if(!state.ekimaeSeeded && !state.stores['駅前店']){ state.stores['駅前店']=ekimaeSeed(); }
state.ekimaeSeeded=true;
/* 駅前店を正式版（実物PDF準拠の8面）へ全端末で1度だけ更新 */
if(!state.ekimaeV6Seeded){ if(state.stores['駅前店'] && state.stores['駅前店'].template==='ekimae'){ state.stores['駅前店']=ekimaeSeed(); } state.ekimaeV6Seeded=true; }
/* 駅前店（昼）を全端末に1度だけ追加（削除後は復活しない） */
if(!state.hiruSeeded && !state.stores['駅前店（昼）']){ state.stores['駅前店（昼）']=hiruSeed(); }
state.hiruSeeded=true;
/* 駅前店（昼）にセット欄を含む版へ全端末で1度だけ更新 */
if(!state.hiruV4Seeded){ if(state.stores['駅前店（昼）'] && state.stores['駅前店（昼）'].template==='hiru'){ state.stores['駅前店（昼）']=hiruSeed(); } state.hiruV4Seeded=true; }
/* 刻ロゴを全端末に1度だけ適用 */
Object.values(state.stores).forEach(st=>{ if(st.template==='toki' && st.toki){ if(!st.toki.logoSeeded && !st.toki.logo){ st.toki.logo=DEFAULT_TOKI_LOGO; } st.toki.logoSeeded=true; } });
persist();
renderStores(); renderEditor(); renderPreview(); updateUndoBtn();
</script>
