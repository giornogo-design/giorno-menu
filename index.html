<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIORNO 季節メニュー メーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Pinyon+Script&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f2ee; --panel:#ffffff; --line:#e3ded5; --ink:#1a1a1a;
    --muted:#8a8378; --accent:#b89b5e; --accent-d:#9c8146; --danger:#c05a4a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Shippori Mincho",-apple-system,"Hiragino Mincho ProN",serif;
       background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:#fff;
         border-radius:8px;padding:6px 12px;font-size:13px;color:var(--ink);transition:.12s}
  button:hover{border-color:var(--accent);color:var(--accent-d)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{background:var(--accent-d);color:#fff}
  button.mini{padding:2px 7px;font-size:12px;border-radius:6px;line-height:1.4}
  button.danger{color:var(--danger);border-color:#e9cfc9}
  button:disabled{opacity:.4;cursor:default}
  button:disabled:hover{border-color:var(--line);color:var(--ink)}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .collabel{font-size:12px;color:var(--accent-d);letter-spacing:.08em;margin:10px 2px 6px;font-weight:600}
  .rangerow{display:flex;align-items:center;gap:8px;margin:6px 0}
  .rangerow .rv{font-size:11px;color:var(--muted);min-width:38px;text-align:right}
  input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);
         border-radius:7px;padding:6px 8px;background:#fff;color:var(--ink);width:100%}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  textarea{resize:vertical;min-height:38px;line-height:1.5}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);
          border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:20px;letter-spacing:.06em}
  .brand small{font-size:11px;color:var(--muted);letter-spacing:.2em;margin-left:6px;font-family:"Shippori Mincho"}
  .topbar .spacer{flex:1}
  .storebox{display:flex;align-items:center;gap:6px}
  .storebox select{width:auto;min-width:140px;font-size:14px}
  .save-flag{font-size:11px;color:var(--muted)}

  /* ---------- main split ---------- */
  .main{flex:1;display:flex;min-height:0}
  .editor{width:430px;min-width:360px;max-width:46%;overflow-y:auto;padding:16px;
          border-right:1px solid var(--line);background:var(--panel)}
  .preview-wrap{flex:1;overflow:auto;background:#dcd8d0;padding:26px;display:flex;
                flex-direction:column;align-items:center;gap:26px}

  /* editor cards */
  .sec{margin-bottom:18px}
  .sec-h{display:flex;align-items:center;gap:8px;margin:4px 0 10px}
  .sec-h h3{margin:0;font-size:14px;letter-spacing:.04em}
  .sec-h .ln{flex:1;height:1px;background:var(--line)}
  .row{display:flex;gap:8px;margin-bottom:8px}
  .row .f{flex:1}
  .lbl{font-size:11px;color:var(--muted);margin:0 0 3px 2px;display:block}
  .card{border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:11px;background:#fdfcfa}
  .card.cat{background:#faf7f0}
  .card-h{display:flex;align-items:center;gap:6px;margin-bottom:9px}
  .card-h .grip{color:var(--muted);font-size:13px}
  .card-h .ttl{flex:1;font-size:12px;color:var(--muted)}
  .ctrls{display:flex;gap:4px}
  .item{border:1px dashed var(--line);border-radius:8px;padding:8px;margin:7px 0;background:#fff}
  .col-pick{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .col-pick button{border:none;border-radius:0;padding:3px 9px;font-size:12px}
  .col-pick button.on{background:var(--accent);color:#fff}
  .addbtn{width:100%;border-style:dashed;color:var(--muted);margin-top:2px}
  .hint{font-size:11px;color:var(--muted);line-height:1.6;margin:4px 2px}
  .price-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

  /* ---------- PRINT PAGE ---------- */
  .page{width:297mm;height:210mm;background:#fff;color:#111;position:relative;
        box-shadow:0 8px 34px rgba(0,0,0,.18);flex:0 0 auto}
  .page-inner{position:absolute;inset:0;padding:14mm 16mm}

  /* front */
  .m-head{margin-bottom:5mm}
  .m-month{font-family:"Pinyon Script",cursive;font-size:60pt;line-height:.9;color:#111}
  .m-year{font-size:16.2pt;letter-spacing:.15em;color:#333;margin-top:1mm}
  .page-inner.front-inner{display:flex;flex-direction:column}
  .front-cols{display:grid;grid-template-columns:1fr 1fr;gap:10mm;flex:1;min-height:0}
  .fcol{display:flex;flex-direction:column;min-height:0}
  .fcol .cats-mid{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0}
  .cat-block{margin-bottom:7mm;break-inside:avoid}
  .cat-title{display:flex;align-items:baseline;gap:4mm;margin-bottom:2.5mm}
  .cat-title .ja{font-weight:600;font-size:15pt}
  .cat-title .en{font-family:"Cormorant Garamond",serif;font-size:14pt;letter-spacing:.06em;font-weight:500}
  .d-item{display:flex;justify-content:space-between;align-items:baseline;gap:6mm;margin:1.6mm 0}
  .d-item .nm{font-size:9.5pt;font-weight:400}
  .d-item .desc{font-size:7.5pt;color:#555;margin-top:.4mm}
  .d-price{display:flex;gap:6mm;white-space:nowrap;font-size:9pt;font-variant-numeric:tabular-nums}
  .d-price span{min-width:15mm;text-align:right;display:inline-block}
  .d-price .empty{color:transparent}
  .footnote{position:absolute;left:13mm;right:calc(50% + 19mm);bottom:6mm;text-align:center;
            font-size:9pt;color:#2a2a2a;line-height:1.65;white-space:pre-line}
  .fcol-left{transform:translateX(-3mm)}
  .fcol-right{transform:translateX(3mm)}

  /* 二つ折りガイド（画面のみ・印刷されない） */
  .fold-line{position:absolute;top:0;bottom:0;left:50%;border-left:1px dashed #d5cfc3;z-index:5;pointer-events:none}
  .fold-tag{position:absolute;top:2.5mm;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.18em;
            color:#b3ac9e;background:#fff;padding:1px 6px;border-radius:7px;z-index:6}

  /* back（二つ折り外側：左=FOOD/裏表紙、右=ロゴ/表表紙） */
  .back-fold{display:grid;grid-template-columns:1fr 1fr;height:100%}
  .page-inner.fold{padding:14mm 0}
  .panel{position:relative;height:100%}
  .panel-left{padding:0 14mm;display:flex;flex-direction:column;justify-content:center}
  .panel-left .food-title{font-family:"Cormorant Garamond",serif;font-size:30pt;font-weight:500;
            letter-spacing:.05em;text-align:center;margin:1mm 0 5mm}
  .food-list{text-align:center}
  .food-item{margin:3.1mm 0}
  .food-item .nm{font-weight:600;font-size:10.5pt}
  .food-item .desc{font-size:8pt;color:#555;margin-top:.4mm}
  .food-item .pr{font-size:10pt;margin-top:.5mm;font-variant-numeric:tabular-nums}
  .panel-foot{position:absolute;left:14mm;right:14mm;bottom:1mm;text-align:center;
            font-size:9.5pt;color:#222;line-height:1.7;white-space:pre-line}
  .bcover{position:relative;padding:8mm 14mm}
  .cover-center{position:absolute;width:100%;left:50%;top:50%;transform:translate(-50%,-50%);
            display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 14mm}
  .bcover img{max-height:120mm;object-fit:contain}
  .bcover img.clogo{max-width:60%}
  .cover-sub{font-size:11pt;letter-spacing:.45em;color:#1a1a1a;margin-top:1mm}
  .cover-photo{position:absolute;transform:translate(-50%,-50%);max-height:80mm;object-fit:contain;z-index:1}
  .cover-charge{position:absolute;left:14mm;right:14mm;bottom:1mm;text-align:center;
            font-size:9pt;color:#222;line-height:1.6;white-space:normal}
  .bcover .txtlogo{text-align:center}
  .bcover .txtlogo .mn{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:36pt;letter-spacing:.05em}
  .bcover .txtlogo .sb{font-size:10pt;letter-spacing:.55em;color:#333;margin-top:2mm}
  .page-tag{position:absolute;top:-22px;left:0;font-size:11px;color:#5c564c;letter-spacing:.08em}

  /* ---------- モバイルタブ（狭い画面のみ表示） ---------- */
  .mtabs{display:none}

  @media (max-width:820px){
    body{height:100vh}
    .topbar{gap:6px;padding:8px 10px;row-gap:6px}
    .brand{font-size:16px}
    .brand small{display:none}
    .save-flag{display:none}
    .topbar button{padding:6px 9px;font-size:12px}
    .storebox{order:5;width:100%}
    .storebox select{flex:1;min-width:0}
    .topbar .spacer{display:none}

    .mtabs{display:flex;gap:6px;padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--line)}
    .mtabs button{flex:1;padding:10px;font-size:14px;border-radius:9px}
    .mtabs button.on{background:var(--accent);border-color:var(--accent);color:#fff}

    .main{flex-direction:column}
    .editor{width:100%;max-width:100%;min-width:0;border-right:none;flex:1;min-height:0;padding:14px}
    .preview-wrap{width:100%;flex:1;min-height:0;padding:12px}
    .row{flex-direction:column;gap:8px}
    .row .f[style*="max-width"]{max-width:100%!important}

    /* タブで表示を切替 */
    body:not(.mview) .preview-wrap{display:none}
    body.mview .editor{display:none}
    body.mview .preview-wrap{display:flex}
    /* スワイプで縦スクロール＋ピンチ拡大の両方を許可 */
    .preview-wrap{touch-action:pan-y pinch-zoom;-webkit-overflow-scrolling:touch}
  }

  /* ===== 刻（TOKI）テンプレ：A4縦・1枚 ===== */
  .page.portrait{width:210mm;height:297mm}
  .toki-inner{position:absolute;inset:0;padding:22mm 20mm 18mm;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .toki-logo{margin-top:2mm}
  .toki-logo img{max-width:80%;object-fit:contain}
  .toki-title-main{font-family:"Cormorant Garamond",serif;font-size:19pt;letter-spacing:.24em;margin-top:10mm;font-weight:500}
  .toki-title-sub{font-size:12pt;letter-spacing:.12em;margin-top:3mm}
  .toki-items{width:100%;max-width:160mm;margin:16mm auto 0}
  .toki-item{display:grid;grid-template-columns:32mm 1fr auto;align-items:baseline;gap:5mm;margin:7mm 0}
  .toki-item .tja{font-size:11pt;text-align:left;letter-spacing:.05em}
  .toki-item .ten{font-family:"Cormorant Garamond",serif;font-size:11pt;text-align:left;letter-spacing:.03em}
  .toki-item .tpr{font-size:11pt;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .toki-desc{margin-top:18mm;font-size:9.5pt;line-height:2.05;white-space:pre-line}
  .toki-desc-en{font-family:"Cormorant Garamond",serif;font-size:9.5pt;color:#333;line-height:1.9;margin-top:7mm;white-space:pre-line}
  .toki-foot{position:absolute;left:20mm;right:20mm;bottom:14mm;font-size:8.5pt;color:#222;line-height:1.75;white-space:pre-line}
  .toki-foot .en{font-family:"Cormorant Garamond",serif;color:#444}

  @media print{
    html,body{height:auto;overflow:visible;background:#fff}
    .topbar,.mtabs,.editor,.no-print{display:none!important}
    .main,.preview-wrap{display:block;padding:0;overflow:visible;background:#fff;height:auto}
    .page{box-shadow:none;margin:0!important;transform:none!important;page-break-after:always;break-after:page}
    .page:last-child{page-break-after:auto}
    .page-tag{display:none}
  }
</style>
<style id="pageSizeStyle">@page{size:A4 landscape;margin:0}</style>
</head>
<body>

<div class="topbar no-print">
  <div class="brand">GIORNO<small>季節メニュー メーカー</small></div>
  <div class="storebox">
    <span class="lbl" style="margin:0">店舗</span>
    <select id="storeSel"></select>
    <button class="mini" id="addStore">＋店舗</button>
    <button class="mini" id="renStore">名称変更</button>
    <button class="mini danger" id="delStore">削除</button>
  </div>
  <div class="spacer"></div>
  <button id="undoBtn" title="直前の変更を取り消す" disabled>↩ 元に戻す</button>
  <span class="save-flag" id="saveFlag">自動保存 済</span>
  <button id="loadBtn">📂 ファイル読込</button>
  <button id="saveBtn">💾 ファイル保存</button>
  <button class="primary" id="printBtn">🖨 印刷 / PDF</button>
  <input type="file" id="fileInput" accept="application/json" style="display:none">
</div>

<div class="mtabs no-print">
  <button id="mtabEdit" class="on">✏️ 編集</button>
  <button id="mtabView">👁 プレビュー</button>
</div>

<div class="main">
  <div class="editor no-print" id="editor"></div>
  <div class="preview-wrap" id="preview"></div>
</div>

let state = load() || { current:"片町店", stores:{ "片町店": katamachiSeed() } };

function load(){ try{return JSON.parse(localStorage.getItem(LS_KEY))}catch(e){return null} }
function persist(){
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  const f=document.getElementById("saveFlag"); f.textContent="自動保存 済 ✓";
  clearTimeout(persist._t); persist._t=setTimeout(()=>f.textContent="自動保存 済",1200);
}
const cur = () => state.stores[state.current];

function bind(sel,path,relabel){
  const node=document.querySelector(sel); if(!node)return;
  node.oninput=e=>{ setPath(cur(),path,e.target.value); renderPreview(); persist();
    if(relabel){ /* labels shown in placeholders update on next structural render */ } };
}
function setPath(o,path,v){const p=path.split('.');let t=o;for(let i=0;i<p.length-1;i++)t=t[p[i]];t[p[p.length-1]]=v;}

function moveCat(i,dir){ // 同じ列の中で並び替え
  const a=cur().front.categories; const col=a[i].col===2?2:1;
  let j=i+dir; while(j>=0&&j<a.length){ if((a[j].col===2?2:1)===col) break; j+=dir; }
  if(j<0||j>=a.length)return;
  pushUndo();[a[i],a[j]]=[a[j],a[i]];renderEditor();renderPreview();persist();}
function moveItem(c,i,dir){const j=i+dir;if(j<0||j>=c.items.length)return;pushUndo();[c.items[i],c.items[j]]=[c.items[j],c.items[i]];renderEditor();renderPreview();persist();}
function moveFood(i,dir){const a=cur().back.items;const j=i+dir;if(j<0||j>=a.length)return;pushUndo();[a[i],a[j]]=[a[j],a[i]];renderEditor();renderPreview();persist();}

function onIllus(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{pushUndo();cur().back.illus=r.result;renderEditor();renderPreview();persist();};
  r.readAsDataURL(file);
}
function onPhoto(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{pushUndo();const b=cur().back;b.photo=r.result;
    if(b.photoX==null)b.photoX=50; if(b.photoY==null)b.photoY=60; /* 空きスペース中央に初期配置 */
    if(b.logoY==null||b.logoY===50)b.logoY=20; /* ロゴは自動で上へ */
    renderEditor();renderPreview();persist();};
  r.readAsDataURL(file);
}

   </div>`;

  const ls=s.back.logoScale||60, ps=s.back.photoScale||55;

     : `<div class="txtlogo"><div class="mn">${esc(s.back.logoMain)}</div><div class="sb">${esc(s.back.logoSub)}</div></div>`;
  const back=`

     <div class="fold-line no-print"></div><div class="fold-tag no-print">折り線</div>

  const wrap=document.getElementById("preview");

  fitScale();

/* プレビューを枠に合わせて縮小 */
function fitScale(){
  const wrap=document.getElementById("preview");
  if(!wrap.clientWidth) return; // 非表示中はスキップ
  const pages=wrap.querySelectorAll(".page");
  const cs=getComputedStyle(wrap);
  const pad=parseFloat(cs.paddingLeft)+parseFloat(cs.paddingRight);
  const avail=wrap.clientWidth-pad-4;
  pages.forEach(p=>{ // 用紙サイズ（縦/横）ごとに自動で縮尺
    p.style.transform="none";
    const w=p.offsetWidth, h=p.offsetHeight;
    const scale=Math.min(1, avail/w);
    p.style.transform=`scale(${scale})`; p.style.transformOrigin="top center";
    p.style.marginBottom=(h*scale - h + 26)+"px"; });
}
window.addEventListener("resize",fitScale);

  const n=prompt("新しい店舗名を入力","");if(!n)return;
  if(state.stores[n]){alert("同名の店舗があります");return;}
  const t=prompt("デザインを選んでください：\n1 = 片町型（A4横・果物カクテル）\n2 = 刻型（A4縦・樽熟酒）\n\n番号を入力","1");
  if(t===null)return;
  pushUndo();
  if(t.trim()==="2"){ state.stores[n]=tokiSeed(); }
  else if(confirm("片町店の内容をコピーして作成しますか？（キャンセルで空から作成）"))
     state.stores[n]=JSON.parse(JSON.stringify(state.stores["片町店"]||katamachiSeed()));
  else state.stores[n]=emptyStore();
  state.current=n;renderStores();renderEditor();renderPreview();persist();
};
document.getElementById("renStore").onclick=()=>{
  const n=prompt("店舗名を変更",state.current);if(!n||n===state.current)return;
  if(state.stores[n]){alert("同名の店舗があります");return;}
  pushUndo();
  state.stores[n]=state.stores[state.current];delete state.stores[state.current];
  state.current=n;renderStores();persist();
};
document.getElementById("delStore").onclick=()=>{
  if(Object.keys(state.stores).length<=1){alert("最後の1店舗は削除できません");return;}
  if(!confirm(`店舗「${state.current}」を削除しますか？`))return;
  pushUndo();
  delete state.stores[state.current];state.current=Object.keys(state.stores)[0];
  renderStores();renderEditor();renderPreview();persist();
};
function emptyStore(){return{meta:{month:"",year:"2026",cLabel:"C",mLabel:"M"},
  front:{categories:[{id:uid(),fruitJa:"",fruitEn:"",col:1,items:[{id:uid(),name:"",desc:"",c:"",m:""}]}],footnote:""},
  back:{heading:"FOOD",logoMain:"GIORNO",logoSub:"ジョルノ",photo:"",logoScale:60,photoScale:55,photoX:50,photoY:60,logoX:50,logoY:50,items:[{id:uid(),name:"",desc:"",price:""}],illus:DEFAULT_LOGO,logoSeeded:true,note:"",charge:""}};}

document.getElementById("saveBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`GIORNO_メニュー_${new Date().toISOString().slice(0,10)}.json`;a.click();
};
document.getElementById("loadBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(!d.stores||!d.current)throw 0;
    state=d;renderStores();renderEditor();renderPreview();persist();
    alert("読み込みました");}catch(x){alert("読み込めませんでした（ファイル形式が違います）");}};
  r.readAsText(f);e.target.value="";
};
document.getElementById("printBtn").onclick=()=>window.print();

/* util */
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* =========================================================
   元に戻す（undo）
========================================================= */
let undoStack=[];
function snapshot(){return JSON.stringify({current:state.current,stores:state.stores});}
function pushUndo(){
  const snap=snapshot();
  if(undoStack.length && undoStack[undoStack.length-1]===snap) return; // 変化なしはスキップ
  undoStack.push(snap);
  if(undoStack.length>100) undoStack.shift();
  updateUndoBtn();
}
function updateUndoBtn(){ const b=document.getElementById('undoBtn'); if(b) b.disabled=undoStack.length===0; }
function doUndo(){
  if(!undoStack.length) return;
  const prev=JSON.parse(undoStack.pop());
  state.current=prev.current; state.stores=prev.stores;
  renderStores(); renderEditor(); renderPreview();
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  updateUndoBtn();
}
document.getElementById('undoBtn').onclick=doUndo;
// テキスト入力は、フィールドにフォーカスした時点を1手として記録
document.getElementById('editor').addEventListener('focusin', e=>{
  if(e.target.matches('input, textarea, select')) pushUndo();
});

/* init */
/* 既定ロゴを全端末に適用（空のstoreにDEFAULT_LOGOを1度だけ） */
Object.values(state.stores).forEach(st=>{ if(!st.template) st.template='katamachi'; if(st.back){ if(!st.back.logoSeeded && !st.back.illus){ st.back.illus=DEFAULT_LOGO; } st.back.logoSeeded=true; } });
/* 刻メニューを全端末に1度だけ追加（削除後は復活しない） */
if(!state.tokiSeeded && !state.stores['刻']){ state.stores['刻']=tokiSeed(); }
state.tokiSeeded=true;
/* 刻ロゴを全端末に1度だけ適用 */
Object.values(state.stores).forEach(st=>{ if(st.template==='toki' && st.toki){ if(!st.toki.logoSeeded && !st.toki.logo){ st.toki.logo=DEFAULT_TOKI_LOGO; } st.toki.logoSeeded=true; } });
persist();
renderStores(); renderEditor(); renderPreview(); updateUndoBtn();
</script>
